# =====================================================
# DüğünDefteri - Build Analyzer
# =====================================================

targets:
  $default:
    builders:
      drift_dev:
        options:
          store_date_time_values_as_text: true
          sql:
            dialects:
              - sqlite

      freezed:
        options:
          union_key: 'type'
          union_value_case: 'pascal'

      json_serializable:
        options:
          any_map: false
          checked: true
          create_factory: true
          create_to_json: true
          disallow_unrecognized_keys: false
          explicit_mode: null
          field_rename: none
          generic_argument_names: true
          ignore_unannotated: false
          include_if_null: true
          explicit_to_json: null

      riverpod_generator:
        options:
          provider_name: 'provider'
          provider_name_pattern: '{name}Provider'
          async_notifier: true